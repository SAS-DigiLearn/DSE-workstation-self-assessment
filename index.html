  <script>

function saveProgress() {
  const data = {
    currentQuestion,
    currentSection,
    userAnswers,
    userInfo
  };

  localStorage.setItem("ergoBotProgress", JSON.stringify(data));
}

function loadProgress() {
  const saved = localStorage.getItem("ergoBotProgress");
  if (!saved) return false;

  try {
    const data = JSON.parse(saved);

    currentQuestion = data.currentQuestion || 0;
    currentSection = data.currentSection || null;
    userAnswers = data.userAnswers || [];
    userInfo = data.userInfo || {};

    return true;
  } catch (e) {
    console.error("Failed to load progress", e);
    return false;
  }
}

function clearProgress() {
  localStorage.removeItem("ergoBotProgress");
}

   function formatHTMLtoText(html) {
  const tempDiv = document.createElement("div");
  tempDiv.innerHTML = html;
  const listItems = tempDiv.querySelectorAll("li");
  listItems.forEach(li => {
    li.textContent = `• ${li.textContent}`;
  });
  tempDiv.innerHTML = tempDiv.innerHTML.replace(/<br\s*\/?>/gi, '\n');
  return tempDiv.textContent || tempDiv.innerText || "";
}

    async function showTyping(text = "", speed = 40) {
      const typing = document.createElement('div');
      typing.className = 'message bot typing';
      typing.innerText = "ErgoBot is typing...";
      messages.appendChild(typing);
      messages.scrollTop = messages.scrollHeight;
      const delay = Math.min(3000, Math.max(400, text.length * speed));
      return new Promise(resolve => {
        setTimeout(() => {
          typing.remove();
          resolve();
        }, delay);
      });
    }

  function appendMessage(text, sender, q = null) {
  const msg = document.createElement('div');

    img.alt = q.alt ?? "";

    messages.appendChild(img);

  messages.scrollTop = messages.scrollHeight;

function toggleAccordion(sectionHeader, sectionContent) {
  const isOpening = sectionContent.style.display !== "block";

  sectionHeader.classList.toggle("active");
  sectionContent.style.display = isOpening ? "block" : "none";

  sectionHeader.setAttribute("aria-expanded", isOpening ? "true" : "false");

  if (isOpening) {

        block: "start"
      });
    }, 50);
  }
}

function editInline(index) {
  const entry = userAnswers[index];
  const div = document.getElementById(`review-${index}`);

  // 🧠 store original state (for cancel)
  entry._backup = {
    answer: entry.answer,
    issue: entry.issue
  };

  const isYes = entry.answer.startsWith("Yes");

  div.innerHTML = `
    <strong>Editing Q${index + 1}</strong><br>
    ${entry.question}<br><br>

    <button id="toggle-${index}">
      ${isYes ? "Change to No" : "Change to Yes"}
    </button>

    <div id="issueBox-${index}" style="margin-top:10px; display:${isYes ? "none" : "block"};">
      <textarea id="issue-${index}" rows="3">${entry.issue || ""}</textarea>
    </div>

    <br>
    <button id="save-${index}">Save</button>
    <button id="cancel-${index}">Cancel</button>
  `;

  const toggleBtn = document.getElementById(`toggle-${index}`);
  const issueBox = document.getElementById(`issueBox-${index}`);

  // local UI state (NOT saved yet)
  let currentAnswer = entry.answer;

  toggleBtn.onclick = () => {
    const isYesNow = currentAnswer.startsWith("Yes");

    if (isYesNow) {
      currentAnswer = "No";
      issueBox.style.display = "block";
      toggleBtn.textContent = "Change to Yes";
    } else {
      currentAnswer = "Yes";
      issueBox.style.display = "none";
      toggleBtn.textContent = "Change to No";
    }
  };

  document.getElementById(`save-${index}`).onclick = () =>
    saveInline(index, currentAnswer);

  document.getElementById(`cancel-${index}`).onclick = () =>
    cancelInline(index);
}

function handleAccordionKeydown(e, headers, currentIndex) {
  let newIndex = null;

  switch (e.key) {
    case "ArrowDown":
      newIndex = (currentIndex + 1) % headers.length;
      break;

    case "ArrowUp":
      newIndex = (currentIndex - 1 + headers.length) % headers.length;
      break;

    case "Home":
      newIndex = 0;
      break;

    case "End":
      newIndex = headers.length - 1;
      break;

    case "Enter":
    case " ":
      e.preventDefault();
      headers[currentIndex].click(); // trigger toggle
      return;

    default:
      return;
  }

  if (newIndex !== null) {
    e.preventDefault();
    headers[newIndex].focus();
  }
}
    
 

sectionHeader.onclick = () => toggleAccordion(sectionHeader, sectionContent);

    sectionItem.appendChild(sectionHeader);
    sectionItem.appendChild(sectionContent);
    container.appendChild(sectionItem);
  });

  messages.appendChild(container);
 const headers = container.querySelectorAll(".accordion-header");

headers.forEach((header) => {
  header.addEventListener("keydown", (e) => {
    const headersArray = Array.from(headers);
    const index = headersArray.indexOf(header);
    handleAccordionKeydown(e, headersArray, index);
  });
});

  document.getElementById("progressHeader").style.display = "none";
}

    
    function addPageHeader(doc, userInfo, margin = 20) {
      const pageWidth = doc.internal.pageSize.getWidth();
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(150, 150, 150);
      const headerText = userInfo?.name ? `ErgoBot Self-Check for ${userInfo.name}` : `ErgoBot Self-Check`;
      doc.text(headerText, margin, 12);
      doc.line(margin, 14, pageWidth - margin, 14);
    }

    function addTextBlock(doc, textLines, margin, y, lineHeight = 6) {
      const pageHeight = doc.internal.pageSize.getHeight();
      const footerReserve = 18;
      const availableHeight = pageHeight - footerReserve;

      for (let i = 0; i < textLines.length; i++) {
        if (y + lineHeight > availableHeight) {
          doc.addPage();
          addPageHeader(doc, userInfo, margin);
          y = 25;
        }
        doc.text(textLines[i], margin, y);
        y += lineHeight;
      }
      return y;
    }

    function addFooterToAllPages(doc, margin = 20) {
      const pageCount = doc.internal.getNumberOfPages();
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();

      for (let p = 1; p <= pageCount; p++) {
        doc.setPage(p);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.setTextColor(120, 120, 120);
        doc.text("Generated by ErgoBot", margin, pageHeight - 8);
        doc.text(`Page ${p} of ${pageCount}`, pageWidth - margin, pageHeight - 8, { align: "right" });
      }
    }

  function updateProgress() {
  const total = questions.length;
  const current = Math.min(currentQuestion + 1, total);


  const percent = Math.round((current / total) * 100);
  document.getElementById('progressBar').style.width = percent + "%";
  document.getElementById('progressText').innerText = `Question ${current} of ${total}`;
}
    function setTextColorTracked(doc, r, g, b) {
      doc.setTextColor(r, g, b);
      doc.__currentColor = [r, g, b];
    }

 function generateCSVBlob() {
  let rows = [];

  rows.push([
    "Name",
    "Base",
    "Job",
    "Line manager",
    "Desk",
    "Question",
    "Answer",
    "Issue"
  ]);

  userAnswers.forEach(entry => {
    rows.push([
      userInfo.name,
      userInfo.base,
      userInfo.job,
      userInfo.manager,
      userInfo.desk,
      formatHTMLtoText(entry.question),
      entry.answer,
      entry.issue || ""
    ]);
  });

  const csvContent = rows.map(e =>
    e.map(v => `"${(v || "").replace(/"/g, '""')}"`).join(",")
  ).join("\n");

  return new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
}

    async function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ compress: true });
      doc.setProperties({
        title: `ErgoBot Self-Check - ${userInfo.name || ""}`,
        author: userInfo.name || "ErgoBot"
      });

      const pageWidth = doc.internal.pageSize.getWidth();
      const margin = 20;
      const maxWidth = pageWidth - margin * 2;
      let y = 25;
      const lineHeight = 6;

      doc.setFont("helvetica", "bold");
      doc.setFontSize(18);
      doc.setTextColor(185, 30, 113);
      doc.text("ErgoBot Self-Check Summary", margin, y);
      y += 8;

      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);
      doc.setTextColor(0, 0, 0);
      const details = [
        `Name: ${userInfo.name || ""}`,
        `Base: ${userInfo.base || ""}`,
        `Job title: ${userInfo.job || ""}`,
        `Line manager: ${userInfo.manager || ""}`,
        `Desk: ${userInfo.desk || ""}`
      ];
      details.forEach(line => {
        const lines = doc.splitTextToSize(line, maxWidth);
        y = addTextBlock(doc, lines, margin, y, lineHeight);
      });

      y += 4;
      doc.line(margin, y, pageWidth - margin, y);
      y += 8;

      if (!userAnswers || userAnswers.length === 0) {
        const noResp = doc.splitTextToSize("No responses were recorded during this session.", maxWidth);
        y = addTextBlock(doc, noResp, margin, y, lineHeight);
      } else {
        userAnswers.forEach((entry, idx) => {
          doc.setFont("helvetica", "normal");
          doc.setFontSize(14);
          setTextColorTracked(doc, 0, 0, 0);
          const questionText = `${idx + 1}. ${formatHTMLtoText(entry.question)}`;
          const qLines = doc.splitTextToSize(questionText, maxWidth);
          y = addTextBlock(doc, qLines, margin, y, lineHeight);
          y += 2;

          doc.setFontSize(12);
          setTextColorTracked(doc, 185, 30, 113);
          const answerText = `Answer: ${entry.answer || ""}`;
          const aLines = doc.splitTextToSize(answerText, maxWidth - 10);
          y = addTextBlock(doc, aLines, margin + 5, y, lineHeight);
          y += 2;

          if (entry.issue) {
            doc.setFontSize(10);
            setTextColorTracked(doc, 0, 0, 0);
            const issueText = `User comment: ${entry.issue}`;
            const iLines = doc.splitTextToSize(issueText, maxWidth - 20);
            y = addTextBlock(doc, iLines, margin + 10, y, lineHeight);
            y += 4;
          }

          doc.line(margin, y, pageWidth - margin, y);
          y += 10;
        });
      }
      
      doc.setPage(1);
      addPageHeader(doc, userInfo, margin);
      addFooterToAllPages(doc, margin);

      const safeName = (userInfo.name || "ErgoBot").replace(/[^\w\-]+/g, "_");
      return doc.output("blob");
    }

  window.onload = () => {
  const hasProgress = loadProgress();

  if (hasProgress && userInfo.name) {
    if (confirm("Resume your previous session?")) {
      document.getElementById('userInfoForm').style.display = 'none';
      document.getElementById('chatbox').style.display = 'block';

      document.getElementById("progressContainer").style.display = "block";
      document.getElementById("progressHeader").style.display = "flex";
      document.getElementById("restartBtn").style.display = "inline-block";

      showQuestion();
      return;
    } else {
      clearProgress();
    }
  }
};
  </script>
